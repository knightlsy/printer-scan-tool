<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- =====================================================================
       SCAN.GATE 应用图标 · Liquid Glass 设计语言
       - 冷蓝白磨砂方角瓷砖（对应 UI 背景 #eef2f9→#d8e2f2 + 浮动光斑）
       - 白色玻璃扫描页 + 视窗取景括号（SCAN）
       - 发光蓝色扫描光束 + 信号品牌光点（GATE 门户/信号）
       主色 Apple 系统蓝 #2f6bff 仅作点睛，克制不泛滥。
       ===================================================================== -->
  <defs>
    <!-- 背景冷色渐变（与背景 bg-1/2/3 同源） -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#eef2f9"/>
      <stop offset="0.52" stop-color="#e4ebf5"/>
      <stop offset="1" stop-color="#d8e2f2"/>
    </linearGradient>
    <!-- 左上近白提亮（模拟顶部光折射） -->
    <radialGradient id="topGlow" cx="0.2" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- 主色渐变（扫描光束 / 光点，accent-hi→accent→accent-press） -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5689ff"/>
      <stop offset="0.55" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#1f54e0"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.36" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#7ea7ff"/>
      <stop offset="0.5" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#1f54e0"/>
    </radialGradient>
    <!-- 光斑（对应 blob-a/blob-b 冷蓝） -->
    <radialGradient id="blobA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#78aaff" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#78aaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b4c8ff" stop-opacity="0.5"/>
      <stop offset="0.7" stop-color="#b4c8ff" stop-opacity="0"/>
    </radialGradient>
    <!-- 玻璃页面微渐变 -->
    <linearGradient id="page" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.82"/>
    </linearGradient>

    <!-- 方角瓷砖裁剪路径（squircle 近似：大圆角矩形） -->
    <clipPath id="tileClip">
      <rect x="56" y="56" width="400" height="400" rx="104" ry="104"/>
    </clipPath>

    <!-- 外阴影 -->
    <filter id="tileShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#1f2655" flood-opacity="0.22"/>
    </filter>
    <!-- 光束辉光 -->
    <filter id="beamGlow" x="-60%" y="-200%" width="220%" height="500%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 光点辉光 -->
    <filter id="orbGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#2f6bff" flood-opacity="0.55"/>
    </filter>
    <!-- 页面阴影 -->
    <filter id="pageShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2655" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ================= 方角瓷砖底座 ================= -->
  <g filter="url(#tileShadow)">
    <rect x="56" y="56" width="400" height="400" rx="104" ry="104" fill="url(#bg)"/>
  </g>

  <g clip-path="url(#tileClip)">
    <!-- 冷色底 + 浮动光斑 -->
    <rect x="56" y="56" width="400" height="400" fill="url(#bg)"/>
    <circle cx="140" cy="130" r="190" fill="url(#blobA)"/>
    <circle cx="392" cy="400" r="170" fill="url(#blobB)"/>
    <!-- 顶部光提亮 -->
    <rect x="56" y="56" width="400" height="400" fill="url(#topGlow)"/>

    <!-- ============ 扫描页（白玻璃） ============ -->
    <g filter="url(#pageShadow)">
      <rect x="176" y="150" width="160" height="212" rx="22" ry="22" fill="url(#page)"
            stroke="#ffffff" stroke-opacity="0.9" stroke-width="1.5"/>
    </g>
    <!-- 页面文本行（冷灰） -->
    <g fill="#c3cfe4">
      <rect x="202" y="188" width="108" height="11" rx="5.5"/>
      <rect x="202" y="214" width="86"  height="11" rx="5.5"/>
      <rect x="202" y="300" width="108" height="11" rx="5.5"/>
      <rect x="202" y="326" width="72"  height="11" rx="5.5"/>
    </g>

    <!-- ============ 扫描取景括号（accent） ============ -->
    <g stroke="url(#accent)" stroke-width="9" stroke-linecap="round" fill="none" stroke-opacity="0.92">
      <path d="M150 196 V168 A18 18 0 0 1 168 150 H196"/>
      <path d="M316 150 H344 A18 18 0 0 1 362 168 V196"/>
      <path d="M362 316 V344 A18 18 0 0 1 344 362 H316"/>
      <path d="M196 362 H168 A18 18 0 0 1 150 344 V316"/>
    </g>

    <!-- ============ 扫描光束 + 拖影 ============ -->
    <rect x="166" y="242" width="180" height="34" rx="17" fill="url(#accent)" opacity="0.12"/>
    <g filter="url(#beamGlow)">
      <rect x="168" y="253" width="176" height="8" rx="4" fill="url(#accent)"/>
    </g>
    <rect x="168" y="253" width="176" height="3" rx="1.5" fill="#eaf1ff" opacity="0.9"/>

    <!-- ============ 品牌光点（GATE 信号/门户） ============ -->
    <g filter="url(#orbGlow)">
      <circle cx="344" cy="257" r="15" fill="url(#orb)"/>
    </g>
    <circle cx="339" cy="252" r="4.5" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- 瓷砖 1px 冷调描边 + 顶部高光 -->
  <rect x="56.75" y="56.75" width="398.5" height="398.5" rx="103.5" ry="103.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.5"/>
  <rect x="57.5" y="57.5" width="397" height="397" rx="103" ry="103"
        fill="none" stroke="#2f6bff" stroke-opacity="0.10" stroke-width="1"/>
</svg>
