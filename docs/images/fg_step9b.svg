<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#eef2f9"/><stop offset="1" stop-color="#d8e2f2"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#5689ff"/><stop offset="1" stop-color="#2f6bff"/>
  </linearGradient>
  <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
  </filter>
  <radialGradient id="blobA" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#9fc0ff" stop-opacity="0.7"/><stop offset="1" stop-color="#9fc0ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="blobB" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#c7b8ff" stop-opacity="0.6"/><stop offset="1" stop-color="#c7b8ff" stop-opacity="0"/>
  </radialGradient>
</defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <rect width="960" height="600" fill="#000" fill-opacity="0.18"/>
  <rect x="250" y="200" width="460" height="220" rx="16" fill="#ffffff" fill-opacity="0.95" filter="url(#glass)"/>
  <text x="274" y="238" font-size="16" font-weight="700" fill="#1f2d4d">选择身份</text>
  <text x="686" y="238" font-size="20" fill="#9aa7c0" text-anchor="middle">×</text>
  <text x="274" y="296" font-size="13" fill="#5a6a88">请选择您的身份以联系作者：</text>
  <rect x="452" y="364" width="110" height="32" rx="8" fill="url(#accent)"/><text x="507" y="385" font-size="13" fill="#fff" text-anchor="middle">公司内</text><rect x="576" y="364" width="110" height="32" rx="8" fill="#e9eef8"/><text x="631" y="385" font-size="13" fill="#3a4a6a" text-anchor="middle">公司外</text>
</svg>