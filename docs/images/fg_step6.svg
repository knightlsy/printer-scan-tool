  <text x="244" y="276" font-size="13" fill="#5a6a88">确定要删除文件：</text><text x="244" y="302" font-size="13" fill="#5a6a88">「扫描件_20260709_001.pdf」吗？</text><text x="244" y="328" font-size="13" fill="#5a6a88">此操作不可恢复，且会写入溯源日志。</text>
