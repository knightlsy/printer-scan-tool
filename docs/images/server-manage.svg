<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2f9"/>
      <stop offset="1" stop-color="#d8e2f2"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5689ff"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
    <filter id="glass2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="960" height="600" fill="url(#bg2)"/>
  <rect width="960" height="600" fill="#000" fill-opacity="0.18"/>

  <!-- modal card -->
  <rect x="200" y="120" width="560" height="380" rx="16" fill="#ffffff" fill-opacity="0.92" filter="url(#glass2)"/>
  <text x="224" y="158" font-size="16" font-weight="700" fill="#1f2d4d">服务器管理</text>
  <text x="724" y="158" font-size="20" fill="#9aa7c0" text-anchor="middle">×</text>
  <text x="224" y="184" font-size="11" fill="#7a89a8">已保存的服务器配置，点击「连接」切换为当前使用项。</text>

  <!-- server item 1 (current) -->
  <rect x="224" y="200" width="512" height="64" rx="10" fill="#2f6bff" fill-opacity="0.08" stroke="#2f6bff" stroke-opacity="0.35"/>
  <text x="240" y="226" font-size="13" font-weight="700" fill="#1f2d4d">默认服务器<tspan fill="#2f6bff" font-size="10">  当前</tspan></text>
  <text x="240" y="246" font-size="11" fill="#5a6a88">\\192.168.4.82\share\PDF</text>
  <rect x="360" y="220" width="56" height="26" rx="6" fill="#e9eef8"/>
  <text x="388" y="237" font-size="11" fill="#3a4a6a" text-anchor="middle">连接</text>
  <rect x="424" y="220" width="56" height="26" rx="6" fill="#ffffff" fill-opacity="0.8"/>
  <text x="452" y="237" font-size="11" fill="#3a4a6a" text-anchor="middle">编辑</text>
  <rect x="488" y="220" width="56" height="26" rx="6" fill="#ff6b6b" fill-opacity="0.85"/>
  <text x="516" y="237" font-size="11" fill="#fff" text-anchor="middle">删除</text>

  <!-- server item 2 -->
  <rect x="224" y="276" width="512" height="64" rx="10" fill="#ffffff" fill-opacity="0.5"/>
  <text x="240" y="302" font-size="13" font-weight="700" fill="#1f2d4d">财务部打印机</text>
  <text x="240" y="322" font-size="11" fill="#5a6a88">\\192.168.5.20\scan\Inbox</text>
  <rect x="360" y="296" width="56" height="26" rx="6" fill="#e9eef8"/>
  <text x="388" y="313" font-size="11" fill="#3a4a6a" text-anchor="middle">连接</text>
  <rect x="424" y="296" width="56" height="26" rx="6" fill="#ffffff" fill-opacity="0.8"/>
  <text x="452" y="313" font-size="11" fill="#3a4a6a" text-anchor="middle">编辑</text>
  <rect x="488" y="296" width="56" height="26" rx="6" fill="#ff6b6b" fill-opacity="0.85"/>
  <text x="516" y="313" font-size="11" fill="#fff" text-anchor="middle">删除</text>

  <rect x="224" y="360" width="512" height="40" rx="10" fill="url(#accent2)"/>
  <text x="480" y="385" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">+ 添加服务器</text>
</svg>
